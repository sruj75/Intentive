name: coverage

on:
  pull_request:
  workflow_dispatch:

jobs:
  desktop-js:
    name: Desktop JS coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage
        run: pnpm coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-js-coverage
          path: coverage/apps/desktop/lcov.info
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/apps/desktop/lcov.info
          flags: desktop-js
          token: ${{ secrets.CODECOV_TOKEN }}
          # The hard regression gate is vitest's coverage.thresholds (it fails
          # the "Generate coverage" step). This only surfaces upload errors.
          fail_ci_if_error: true
