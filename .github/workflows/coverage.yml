name: coverage

on:
  pull_request:
  workflow_dispatch:

jobs:
  desktop-js:
    name: Desktop JS coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage
        run: pnpm coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-js-coverage
          path: coverage/apps/desktop/lcov.info
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/apps/desktop/lcov.info
          flags: desktop-js
          token: ${{ secrets.CODECOV_TOKEN }}
          # The hard regression gate is vitest's coverage.thresholds, which fails
          # the "Generate coverage" step before this. Keep upload errors
          # non-fatal: there is no CODECOV_TOKEN secret and Codecov rejects
          # tokenless uploads, so a true here would fail CI on every run.
          fail_ci_if_error: false
