name: monorepo-foundation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Desktop Rust tests
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Impact radius advisory
        run: pnpm sensor:impact-radius
        continue-on-error: true

      - name: Deployable harness template contract
        run: pnpm harness:test

      - name: Harness health report contract
        run: pnpm sensor:harness-health:test

      - name: Factory report contract
        run: pnpm sensor:factory-report:test

      - name: Factory self-improvement contract
        run: pnpm factory:test

      - name: Factory docs integrity contract
        run: pnpm docs:factory:test

      - name: CONTEXT vocabulary docs contract
        run: pnpm docs:context:test

      - name: Agent docs integrity contract
        run: pnpm docs:agents:test

      - name: Architecture lint message contract
        run: pnpm lint:architecture:test

      - name: Harness
        run: pnpm harness:ci
