name: control-plane-ci

# Control Plane pull-request gate: typecheck + the full test suite, including the
# repo-layer integration test (ADR-0003) against a real, disposable Neon branch.
#
# Why this exists separately from control-plane-deploy.yml: that workflow runs
# only on push to main and is gated behind DEPLOY_ENABLED, so before this file
# the Control Plane suite ran on *no* pull request. This job restores PR-time
# coverage and is where the Neon integration test actually executes.
#
# Neon integration test wiring (makes ADR-0003 real instead of aspirational):
#   The test in test/users-repo.integration.test.mjs creates and drops an
#   ephemeral Neon branch via the REST API, applies migrations/0001_users.sql,
#   and asserts the DB-enforced idempotency invariant. It is opt-in: with no
#   NEON_API_KEY / NEON_PROJECT_ID it skips and the suite stays green. Set these
#   repository Actions values to switch it on:
#     NEON_PROJECT_ID   variable: the Control Plane Neon project id
#     NEON_API_KEY      secret: a Neon API key with branch create/delete access
#   Create the key at console.neon.tech → Account settings → API keys.

on:
  pull_request:
    paths:
      - "services/control-plane/**"
      - "packages/api-contract/**"
      - "packages/domain-types/**"
      - "packages/providers/**"
      - ".github/workflows/control-plane-ci.yml"
      - ".github/workflows/neon-preview-branches.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ./services/control-plane typecheck

      - name: Test
        # Builds first (its `test` script runs `pnpm run build` then `node --test`).
        # NEON_* are forwarded for the ADR-0003 integration test; absent → it skips.
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: pnpm --filter ./services/control-plane test
