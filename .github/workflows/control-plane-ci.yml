name: control-plane-ci

# Control Plane pull-request gate: typecheck + the full test suite. The suite's
# Neon repo integration tests remain opt-in for local/on-demand runs when
# NEON_API_KEY and NEON_PROJECT_ID are present. PR-time database validation lives
# in neon-preview-branches.yml so each PR consumes one preview branch instead of
# spawning extra disposable test branches.

on:
  pull_request:
    paths:
      - "services/control-plane/**"
      - "packages/api-contract/**"
      - "packages/domain-types/**"
      - "packages/providers/**"
      - ".github/workflows/control-plane-ci.yml"
      - ".github/workflows/neon-preview-branches.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ./services/control-plane typecheck

      - name: Test
        # Builds first (its `test` script runs `pnpm run build` then `node --test`).
        # NEON_* are intentionally absent in PR CI; Neon preview branch migration
        # validation is handled by neon-preview-branches.yml.
        run: pnpm --filter ./services/control-plane test
