name: desktop-audit

# Rust (cargo) dependency audit for the Tauri desktop app. JS/workspace
# dependency auditing lives in security-audit.yml (runs on every PR + weekly).

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: apps/desktop/src-tauri
          # Ignored advisories + rationale are documented in
          # apps/desktop/src-tauri/.cargo/audit.toml (the source of truth for local
          # `cargo audit`). Mirrored here because the action consumes only this input.
          # Informational unmaintained/unsound warnings are intentionally NOT ignored.
          ignore: RUSTSEC-2023-0071
