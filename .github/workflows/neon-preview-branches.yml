name: neon-preview-branches

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - "services/control-plane/**"
      - "packages/api-contract/**"
      - "packages/domain-types/**"
      - "packages/providers/**"
      - ".github/workflows/neon-preview-branches.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v9

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.action == 'synchronize' ||
      github.event.action == 'opened' ||
      github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Get branch expiration date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Control Plane migrations
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled }}
        run: pnpm --filter ./services/control-plane migrate

      - name: Typecheck
        run: pnpm --filter ./services/control-plane typecheck

      - name: Test
        # The preview branch above validates migrations against Neon. Do not
        # forward NEON_* here, because repo integration tests create additional
        # disposable branches and can exhaust the project branch quota.
        run: pnpm --filter ./services/control-plane test

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
