name: agent-runtime-deploy

# Agent Runtime → Google Compute Engine VM (Container-Optimized OS).
# Triggers on push to main when services/agent-runtime/** or shared packages change.
#
# Push deploys are off until the repository variable DEPLOY_ENABLED is set to
# "true" (Settings → Secrets and variables → Actions → Variables). Secrets
# cannot be referenced in job `if:` conditions — use this variable instead.
#
# Manual test anytime: Actions → agent-runtime-deploy → Run workflow.
#
# Required GitHub secrets (must be set before deploy steps can succeed):
#   GCP_PROJECT_ID
#   AGENT_RUNTIME_GCP_SA_KEY    — JSON key for a Service Account with:
#                                   - Artifact Registry Writer
#                                   - Compute Instance Admin (v1)
#                                   - Service Account User
#
# Required GitHub variables:
#   AGENT_RUNTIME_PUBLIC_WS_URL
#   CONTROL_PLANE_INTERNAL_BASE_URL
#   NEON_AUTH_JWKS_URL
#   NEON_AUTH_ISSUER
#   NEON_AUTH_AUDIENCE
#   AGENT_RUNTIME_SECRET_NAMES  — space-separated Secret Manager allowlist.
#                                 Entries can be ENV_VAR=secret-name aliases,
#                                 typically:
#                                 NEON_DATABASE_URL
#                                 INTERNAL_SECRET_FROM_CONTROL_PLANE=INTERNAL_SECRET_TO_RUNTIME
#                                 INTERNAL_SECRET_TO_CONTROL_PLANE=INTERNAL_SECRET_FROM_RUNTIME
#                                 OPENROUTER_API_KEY
#                                 SENTRY_DSN=AGENT_RUNTIME_SENTRY_DSN
#                                 LANGFUSE_PUBLIC_KEY
#                                 LANGFUSE_SECRET_KEY
#
# Required GCP setup (one-time):
#   - Artifact Registry repository at ${GCP_REGION}-docker.pkg.dev/${PROJECT}/intentive
#   - GCE VM "agent-runtime" running Container-Optimized OS in ${GCE_ZONE}
#   - The VM's metadata configured with `google-logging-enabled=true` and a
#     systemd unit (or `konlet` config) that pulls the configured image tag
#     and restarts the container on change.
#
# Deployment model: image-tag swap. We push a new tag and update the VM
# metadata; konlet picks it up and restarts the container. The VM itself
# stays up (long-running state, cron, heartbeat — see CONTEXT-MAP.md).

env:
  GCP_REGION: us-west1
  GCE_ZONE: us-west1-a
  VM_NAME: agent-runtime
  IMAGE_TAG: ${{ github.sha }}

on:
  push:
    branches: [main]
    paths:
      - "services/agent-runtime/**"
      - "packages/protocol/**"
      - "packages/api-contract/**"
      - "packages/domain-types/**"
      - "packages/providers/**"
      - ".github/workflows/agent-runtime-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Fail fast before touching GCP: nothing ships untested.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ./services/agent-runtime typecheck

      - name: Test
        run: pnpm --filter ./services/agent-runtime test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.AGENT_RUNTIME_GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            -f services/agent-runtime/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.VM_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.VM_NAME }}:${{ env.IMAGE_TAG }}

      - name: Update VM to new image tag
        run: |
          cat > /tmp/agent-runtime.env <<'EOF'
          GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
          SECRET_NAMES=${{ vars.AGENT_RUNTIME_SECRET_NAMES }}
          PUBLIC_WS_URL=${{ vars.AGENT_RUNTIME_PUBLIC_WS_URL }}
          CONTROL_PLANE_INTERNAL_BASE_URL=${{ vars.CONTROL_PLANE_INTERNAL_BASE_URL }}
          NEON_AUTH_JWKS_URL=${{ vars.NEON_AUTH_JWKS_URL }}
          NEON_AUTH_ISSUER=${{ vars.NEON_AUTH_ISSUER }}
          NEON_AUTH_AUDIENCE=${{ vars.NEON_AUTH_AUDIENCE }}
          SENTRY_ENVIRONMENT=production
          SENTRY_RELEASE=agent-runtime@${{ env.IMAGE_TAG }}
          EOF
          sed -i 's/^          //' /tmp/agent-runtime.env
          gcloud compute instances update-container ${{ env.VM_NAME }} \
            --zone ${{ env.GCE_ZONE }} \
            --container-image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.VM_NAME }}:${{ env.IMAGE_TAG }} \
            --container-restart-policy always \
            --container-env-file /tmp/agent-runtime.env

      # Careful rollout for the single stateful VM. The container is swapped in
      # place (a stateful runtime singleton cannot run blue-green — two would
      # double cron + heartbeat ticks). The load balancer already holds public
      # traffic off the new container until its health check passes; this gate
      # makes the job go green only once the swap has fully converged and the
      # public WebSocket front door is serving again. A 426 through the load
      # balancer means the request reached a HEALTHY ws backend without an
      # upgrade (see docs/PRODUCTION.md). If it never converges, the job fails red
      # and the operator rolls the image tag back per the runbook.
      - name: Wait for runtime to serve through the load balancer
        run: |
          set -euo pipefail
          ws_url="${{ vars.AGENT_RUNTIME_PUBLIC_WS_URL }}"
          host="$(printf '%s' "$ws_url" | sed -E 's#^wss?://##; s#/.*$##')"
          url="https://$host"
          echo "Polling $url for the WebSocket front door (expect 426 Upgrade Required)…"
          for attempt in $(seq 1 30); do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 8 --max-time 12 "$url" || true)"
            echo "attempt $attempt/30: HTTP $code"
            if [ "$code" = "426" ]; then
              echo "Runtime front door healthy through the load balancer."
              exit 0
            fi
            sleep 10
          done
          echo "Runtime did not converge to a healthy WebSocket front door after the swap." >&2
          echo "Roll back the image tag per services/agent-runtime/docs/RELEASE.md." >&2
          exit 1
