name: security-audit

# JS dependency audit. Pull requests use GitHub's dependency diff review so they
# do not spend PR time on the slow `pnpm audit` registry call. The weekly/manual
# path still runs the full workspace audit to catch newly-disclosed advisories in
# unchanged dependencies.
# Rust/cargo auditing for the desktop app lives in desktop-audit.yml.

on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/**/package.json"
      - "services/**/package.json"
      - "packages/**/package.json"
      - "tools/**/package.json"
      - ".github/workflows/security-audit.yml"
  schedule:
    # Mondays 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Setup pnpm
        if: github.event_name != 'pull_request'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: github.event_name != 'pull_request'
        run: pnpm install --frozen-lockfile

      - name: Audit all dependencies
        if: github.event_name != 'pull_request'
        run: pnpm audit --audit-level high
