name: desktop-release

# Desktop Client → deep-signed + notarized .dmg plus silent-updater artifacts,
# attached to a GitHub Release. Triggered by pushing a tag like `desktop-v0.1.0`.
#
# Required GitHub secrets:
#   APPLE_DEVELOPER_ID_CERT             — base64 of the .p12 export of the Developer ID Application cert
#   APPLE_DEVELOPER_ID_CERT_PASSWORD    — password for that .p12
#   KEYCHAIN_PASSWORD                   — any random string; used to unlock the runner keychain
#   APPLE_ID                            — your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD         — app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                       — 10-char Team ID from developer.apple.com/account
#   TAURI_SIGNING_PRIVATE_KEY           — Tauri updater signing key (run `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — passphrase for that key
#   SENTRY_AUTH_TOKEN                   — token with project:releases for source-map upload
#
# Required GitHub variables:
#   DESKTOP_SENTRY_DSN                  — public DSN for heyintentive/desktop
#
# After release: flip the landing-page link to the .dmg; in-app updates use
# Tauri's built-in updater pointing at this Release's `latest.json` (ADR-0024).
# Full runbook + clean-Mac smoke: apps/desktop/docs/RELEASE.md.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Public Developer ID identity (also visible in the signed app). Used both by
  # the explicit deep-sign step and handed to Tauri as APPLE_SIGNING_IDENTITY.
  SIGNING_IDENTITY: "Developer ID Application: Srujan Gowda (24D6NXS6H7)"

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        run: |
          if [[ "${GITHUB_REF_NAME}" == desktop-v* ]]; then
            VERSION="${GITHUB_REF_NAME#desktop-v}"
          else
            VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DESKTOP_SENTRY_RELEASE=desktop@$VERSION" >> "$GITHUB_ENV"

      - name: Install Sentry CLI
        run: npm install --global @sentry/cli

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_DEVELOPER_ID_CERT" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Verify native release resources
        run: apps/desktop/scripts/verify-release-artifacts.sh source

      # Deep-sign the nested resource Mach-Os inside-out BEFORE Tauri seals and
      # signs the outer Intentive.app. Notarization rejects any unsigned nested
      # executable, and Tauri does NOT auto-sign files under `bundle.resources`
      # (only the outer app + externalBin sidecars). Order is deepest-first:
      # the helper's inner binary, then the helper .app, then ollama. The outer
      # app is signed by Tauri in the next step, completing the inside-out seal.
      # (ADR-0015 — deep-sign every nested Mach-O.)
      - name: Deep-sign nested helper + ollama (inside-out)
        working-directory: apps/desktop/src-tauri
        run: |
          HELPER="resources/Intentive Capture.app"
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "$HELPER/Contents/MacOS/screenpipe"
          codesign --force --options runtime --timestamp \
            --entitlements entitlements/IntentiveCapture.entitlements \
            --sign "$SIGNING_IDENTITY" \
            "$HELPER"
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            resources/ollama

      - name: Build webview with Sentry release metadata
        working-directory: apps/desktop
        env:
          VITE_SENTRY_DSN: ${{ vars.DESKTOP_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ env.DESKTOP_SENTRY_RELEASE }}
        run: pnpm build

      - name: Inject Sentry source-map debug IDs
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: heyintentive
          SENTRY_PROJECT: desktop
        run: sentry-cli sourcemaps inject apps/desktop/dist

      - name: Stage Sentry source maps outside bundled dist
        run: |
          MAP_DIR="$RUNNER_TEMP/desktop-sentry-sourcemaps"
          rm -rf "$MAP_DIR"
          mkdir -p "$MAP_DIR"
          while IFS= read -r -d '' map; do
            rel="${map#apps/desktop/dist/}"
            mkdir -p "$MAP_DIR/$(dirname "$rel")"
            cp "$map" "$MAP_DIR/$rel"
            rm "$map"
          done < <(find apps/desktop/dist -name '*.map' -print0)
          echo "DESKTOP_SENTRY_SOURCEMAPS=$MAP_DIR" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ vars.DESKTOP_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ env.DESKTOP_SENTRY_RELEASE }}
        run: pnpm tauri build --target aarch64-apple-darwin --config '{"build":{"beforeBuildCommand":""}}'

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="$(ls apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # Build the updater manifest. `createUpdaterArtifacts` produces the signed
      # `.app.tar.gz` + detached `.sig`; the silent updater (ADR-0024) needs a
      # `latest.json` pointing at this Release's tarball with that signature.
      - name: Generate updater latest.json
        working-directory: apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos
        run: |
          TARBALL="$(basename "$(ls *.app.tar.gz)")"
          SIGNATURE="$(cat "$TARBALL.sig")"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/sruj75/Intentive/releases/download/${GITHUB_REF_NAME}/${TARBALL}"
              }
            }
          }
          EOF

      - name: Verify release artifacts
        run: apps/desktop/scripts/verify-release-artifacts.sh bundle

      - name: Create Sentry release and upload webview source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: heyintentive
          SENTRY_PROJECT: desktop
        run: |
          sentry-cli releases new "$DESKTOP_SENTRY_RELEASE" || true
          sentry-cli sourcemaps upload --release "$DESKTOP_SENTRY_RELEASE" "$DESKTOP_SENTRY_SOURCEMAPS"
          sentry-cli releases set-commits "$DESKTOP_SENTRY_RELEASE" --auto
          sentry-cli releases finalize "$DESKTOP_SENTRY_RELEASE"

      - name: Upload DMG + updater artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/latest.json
          generate_release_notes: true
