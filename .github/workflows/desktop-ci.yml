name: desktop-ci

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - ".github/workflows/desktop-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - ".github/workflows/desktop-ci.yml"

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + build + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Architecture lint (Rust layer + structure)
        run: pnpm lint:architecture:rust

      - name: Typecheck
        run: pnpm --dir apps/desktop exec tsc --noEmit

      - name: Build
        run: pnpm --dir apps/desktop build

      - name: Test frontend
        run: pnpm --dir apps/desktop exec vitest run

  rust:
    name: Rust (check + clippy + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
