name: control-plane-deploy

# Control Plane → Google Cloud Run.
# Triggers on push to main when services/control-plane/** or shared packages change.
#
# Push deploys are off until the repository variable DEPLOY_ENABLED is set to
# "true" (Settings → Secrets and variables → Actions → Variables). Secrets
# cannot be referenced in job `if:` conditions — use this variable instead.
#
# Manual test anytime: Actions → control-plane-deploy → Run workflow.
#
# Required GitHub secrets (must be set before deploy steps can succeed):
#   GCP_PROJECT_ID
#   GCP_SA_KEY                  — JSON key for a Service Account with:
#                                   - Artifact Registry Writer
#                                   - Cloud Run Admin
#                                   - Service Account User
#
# Required GCP setup (one-time):
#   - Artifact Registry repository at ${GCP_REGION}-docker.pkg.dev/${PROJECT}/intentive
#   - Cloud Run service "control-plane" in the same region
#   - VPC connector for private internal calls to the Agent Runtime

env:
  GCP_REGION: us-central1
  SERVICE_NAME: control-plane
  IMAGE_TAG: ${{ github.sha }}

on:
  push:
    branches: [main]
    paths:
      - "services/control-plane/**"
      - "packages/api-contract/**"
      - "packages/domain-types/**"
      - "packages/providers/**"
      - ".github/workflows/control-plane-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail fast before touching GCP: nothing ships untested.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ./services/control-plane typecheck

      - name: Test
        run: pnpm --filter ./services/control-plane test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            -f services/control-plane/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: Push image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/intentive/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1
